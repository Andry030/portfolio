name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch: # déclenchement manuel depuis GitHub

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm ci --omit=dev

      - name: Build Next.js
        run: pnpm run build
        env:
          # Variables nécessaires au build (non-secrètes)
          NEXT_PUBLIC_SITE_URL: https://andry.ink

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:       ${{ secrets.VPS_HOST }}
          username:   ${{ secrets.VPS_USER }}
          key:        ${{ secrets.VPS_SSH_KEY }}
          port:       ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e
            echo "── Déploiement andry.ink ──"

            cd /home/andry/perso/portfolio

            # Récupérer les dernières modifications
            git pull origin main

            # Installer les dépendances si package.json a changé
            pnpm ci --omit=dev

            # Reconstruire l'application
            NEXT_PUBLIC_SITE_URL=https://andry.ink pnpm run build

            # Redémarrer via PM2 (zero-downtime reload)
            pm2 reload andry-portfolio --update-env

            echo "✓ Déploiement terminé"

      - name: Notify success
        if: success()
        run: echo " andry.ink déployé avec succès — $(date)"

      - name: Notify failure
        if: failure()
        run: echo "❌ Échec du déploiement — vérifier les logs"