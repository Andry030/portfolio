name: Deploy andry-portfolio

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          port:     ${{ secrets.VPS_PORT }}
          script: |
            echo "── Deploying andry-portfolio ──"
            cd /home/andry/perso/portfolio
            git fetch origin
            git reset --hard origin/main
            pnpm install --frozen-lockfile
            NEXT_PUBLIC_SITE_URL=https://andry.ink pnpm run build
            pm2 reload andry-portfolio --update-env
            echo "✓ andry-portfolio deployed successfully"
