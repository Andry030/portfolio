name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Install dependencies
        run: pnpm ci --omit=dev

      - name: Build Next.js
        run: pnpm run build
        env:
          NEXT_PUBLIC_SITE_URL: https://andry.ink

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:       ${{ secrets.VPS_HOST }}
          username:   ${{ secrets.VPS_USER }}
          key:        ${{ secrets.VPS_SSH_KEY }}
          port:       ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e
            echo "── Déploiement andry.ink ──"

            cd /home/andry/perso/portfolio

            git pull origin main

            pnpm ci --omit=dev

            NEXT_PUBLIC_SITE_URL=https://andry.ink pnpm run build

            pm2 reload andry-portfolio --update-env

            echo "✓ Déploiement terminé"
