# /etc/apache2/sites-available/andry.ink.conf
<VirtualHost *:80>
    ServerName  andry.ink
    ServerAlias www.andry.ink
    RewriteEngine On
    RewriteRule ^ https://%{HTTP_HOST}%{REQUEST_URI} [L,R=301]
</VirtualHost>

<VirtualHost *:443>
    ServerName  andry.ink
    ServerAlias www.andry.ink

    # Reverse proxy vers Next.js
    ProxyPreserveHost On
    ProxyPass        / http://127.0.0.1:7000/
    ProxyPassReverse / http://127.0.0.1:7000/

    # WebSocket support (si nécessaire)
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} =websocket [NC]
    RewriteRule /(.*)           ws://127.0.0.1:7000/$1 [P,L]

    # Sécurité
    Header always set X-Frame-Options           "DENY"
    Header always set X-Content-Type-Options    "nosniff"
    Header always set Referrer-Policy           "strict-origin-when-cross-origin"
    Header always set Strict-Transport-Security "max-age=63072000; includeSubDomains; preload"

    # SSL (Certbot complète automatiquement)
    # SSLEngine on
    # SSLCertificateFile    /etc/letsencrypt/live/andry.ink/fullchain.pem
    # SSLCertificateKeyFile /etc/letsencrypt/live/andry.ink/privkey.pem

    ErrorLog  ${APACHE_LOG_DIR}/andry.ink-error.log
    CustomLog ${APACHE_LOG_DIR}/andry.ink-access.log combined
</VirtualHost>

# Commandes :
# sudo a2enmod proxy proxy_http rewrite headers ssl
# sudo a2ensite andry.ink.conf
# sudo systemctl reload apache2
# sudo certbot --apache -d andry.ink -d www.andry.ink
